<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nova Crest Multimodal City Tourist Kiosk — explore food, attractions, and transport via touch and voice." />
    <meta name="theme-color" content="#020617" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>NovaCrest — Multimodal City Tourist Kiosk</title>
    <style>
      /* Prevent unwanted browser behaviors in kiosk mode */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #020617;
        user-select: none;
      }
      #root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      /* Custom scrollbar for the main content area */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.22);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
